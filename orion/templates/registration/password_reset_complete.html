<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password Reset Complete — Orion Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090d;--bg2:#0d1018;--bg3:#131720;--border:#1a2232;--border2:#26334a;--text:#c8d6e8;--dim:#3d5066;--dim2:#5a7090;--accent:#f5c518;--accent3:#e07818;--green:#2ecc8e;--r:8px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;animation:zoomIn .3s cubic-bezier(.34,1.5,.64,1)}
@keyframes zoomIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.icon{font-size:56px;margin-bottom:20px;animation:popIn .5s cubic-bezier(.34,1.7,.64,1) .1s both}
@keyframes popIn{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.title{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:12px}
.desc{font-size:13px;color:var(--dim2);line-height:1.8;margin-bottom:28px}
.desc strong{color:var(--green)}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border:none;border-radius:var(--r);padding:13px 32px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer;transition:all .22s;text-decoration:none;display:inline-block;box-shadow:0 2px 14px rgba(245,197,24,.25)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,197,24,.35)}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.c{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{from{transform:translateY(-20px) rotate(0);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="confetti" id="confetti"></div>
<div class="wrap">
  <div class="card">
    <div class="icon">✅</div>
    <div class="title">PASSWORD UPDATED!</div>
    <div class="desc">Your password has been reset successfully. <strong>You can now sign in</strong> with your new password.</div>
    <a class="btn" href="/login/">SIGN IN TO ORION →</a>
  </div>
</div>
<script>
const colors=['#f5c518','#2ecc8e','#4a9eff','#f05f6a','#fff'];
const c=document.getElementById('confetti');
for(let i=0;i<40;i++){
  const el=document.createElement('div');
  el.className='c';
  el.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*1}s`;
  c.appendChild(el);
}
</script>
</body>
</html>
