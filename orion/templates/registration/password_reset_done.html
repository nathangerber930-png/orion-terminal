<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Check Your Email — Orion Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090d;--bg2:#0d1018;--bg3:#131720;--border:#1a2232;--border2:#26334a;--text:#c8d6e8;--dim:#3d5066;--dim2:#5a7090;--accent:#f5c518;--accent3:#e07818;--green:#2ecc8e;--r:8px;--rl:13px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;animation:zoomIn .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes zoomIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.icon{font-size:52px;margin-bottom:20px;animation:bounce .6s cubic-bezier(.34,1.5,.64,1)}
@keyframes bounce{from{transform:scale(.5)}to{transform:scale(1)}}
.title{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:14px}
.desc{font-size:13px;color:var(--dim2);line-height:1.8;margin-bottom:28px}
.desc strong{color:var(--text)}
.tip{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:14px;font-size:12px;color:var(--dim2);line-height:1.7;margin-bottom:24px;text-align:left}
.tip strong{color:var(--accent);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border:none;border-radius:var(--r);padding:13px 28px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer;transition:all .22s;text-decoration:none;display:inline-block;box-shadow:0 2px 14px rgba(245,197,24,.25)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,197,24,.35)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">📬</div>
    <div class="title">CHECK YOUR EMAIL</div>
    <div class="desc">We've sent a password reset link to your email address. <strong>It expires in 24 hours.</strong></div>
    <div class="tip">
      <strong>⬡ DIDN'T GET IT?</strong><br><br>
      · Check your spam or junk folder<br>
      · Make sure you used the email you signed up with<br>
      · Wait 1–2 minutes and check again<br>
      · Try requesting another reset below
    </div>
    <a class="btn" href="/password-reset/">REQUEST ANOTHER LINK</a>
  </div>
</div>
</body>
</html>
