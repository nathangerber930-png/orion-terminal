<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — Orion Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090d;--bg2:#0d1018;--bg3:#131720;--border:#1a2232;--border2:#26334a;--text:#c8d6e8;--dim:#3d5066;--dim2:#5a7090;--accent:#f5c518;--accent3:#e07818;--green:#2ecc8e;--red:#f05f6a;--r:8px;--rl:13px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.wrap{width:100%;max-width:400px;position:relative;z-index:1}
.back{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);text-decoration:none;margin-bottom:20px;transition:color .2s}
.back:hover{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:zoomIn .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes zoomIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.brand-logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#000;box-shadow:0 4px 16px rgba(245,197,24,.3)}
.brand-name{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:#fff}
.icon{font-size:36px;text-align:center;margin-bottom:14px}
.card-title{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2px;color:#fff;text-align:center;margin-bottom:6px}
.card-sub{font-size:12px;color:var(--dim2);text-align:center;margin-bottom:24px;line-height:1.7}
.lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--dim2);margin-bottom:6px;display:block}
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none;transition:all .22s;box-shadow:inset 0 1px 3px rgba(0,0,0,.2);margin-bottom:16px}
.inp:focus{border-color:var(--accent);background:#1a2030;box-shadow:0 0 0 3px rgba(245,197,24,.1);transform:translateY(-1px)}
.inp::placeholder{color:var(--dim);font-style:italic}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000;border:none;border-radius:var(--r);padding:13px;width:100%;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer;transition:all .22s;box-shadow:0 2px 14px rgba(245,197,24,.25)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,197,24,.35)}
.divider{height:1px;background:var(--border);margin:20px 0}
.link{text-align:center;font-size:12px;color:var(--dim2)}
.link a{color:var(--accent);text-decoration:none;font-family:'Space Mono',monospace;font-size:11px;transition:color .2s}
.link a:hover{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/login/">← BACK TO LOGIN</a>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">⬡</div>
      <span class="brand-name">ORION</span>
    </div>
    <div class="icon">🔐</div>
    <div class="card-title">RESET PASSWORD</div>
    <div class="card-sub">Enter the email address linked to your account. We'll send you a secure reset link.</div>
    <form method="post">
      {% csrf_token %}
      <label class="lbl">EMAIL ADDRESS</label>
      <input class="inp" type="email" name="email" placeholder="you@example.com" autocomplete="email" autofocus required>
      <button class="btn" type="submit">SEND RESET LINK →</button>
    </form>
    <div class="divider"></div>
    <div class="link">Remembered it? <a href="/login/">Sign in</a></div>
  </div>
</div>
</body>
</html>
